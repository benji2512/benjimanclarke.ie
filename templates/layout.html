<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ description or 'Benjiman Clarke - Software Developer from Ireland. Learn more about me as a professional and as a person.' }}" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="{{ og_type or 'website' }}" />
    <meta property="og:url" content="{{ og_url or 'https://benjimanclarke.ie' }}" />
    <meta property="og:title" content="{{ og_title or 'Benjiman Clarke' }}" />
    <meta property="og:description" content="{{ og_description or 'Benjiman Clarke - Software Developer from Ireland.' }}" />
    <meta property="og:image" content="{{ og_image or 'https://benjimanclarke.ie/static/banner1.jpeg' }}" />
    <meta property="og:site_name" content="Benjiman Clarke" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ og_title or 'Benjiman Clarke' }}" />
    <meta name="twitter:description" content="{{ og_description or 'Benjiman Clarke - Software Developer from Ireland.' }}" />
    <meta name="twitter:image" content="{{ og_image or 'https://benjimanclarke.ie/static/banner1.jpeg' }}" />
    
    <title>{{ page_title or 'Benjiman Clarke' }}</title>
    
    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link href="/static/styles.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:ital,wght@0,400;1,400&display=swap"
        rel="stylesheet"
    />
</head>
<body>
{% include 'navbar.html' %}

<div class="container-fluid">
    <div class="row">
      {% block content %}
      {% endblock %}
    </div>
</div>
<!-- Bootstrap JS and dependencies -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

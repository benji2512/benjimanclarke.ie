{% extends "layout.html" %} {% set active_page = "blog" %} {% block content %}
<!-- Main Content -->
<div class="col-md-9 col-lg-10 main-content">
    <div class="container">
        <h1>{{ post.title }}</h1>
        {% if post.date %}
        <p>{{ post.date.strftime('%Y-%m-%d') }}</p>
        {% endif %}
        <div class="post-body">{{ post.html | safe }}</div>
    </div>
</div>
{% endblock %}
